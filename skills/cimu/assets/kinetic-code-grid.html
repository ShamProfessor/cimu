<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Cimu · Kinetic Code Grid</title>
    <style>
      html, body, canvas { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #090b10; }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <script>
      const canvas = document.getElementById('stage');
      const ctx = canvas.getContext('2d', {alpha: false});
      window.__LYRICS = window.__LYRICS || [];
      window.__DURATION = window.__DURATION || 30;

      const clamp = (n, min, max) => Math.max(min, Math.min(max, n));
      const easeOutBack = (x) => 1 + 2.70158 * Math.pow(x - 1, 3) + 1.70158 * Math.pow(x - 1, 2);
      const hash = (n) => {
        const x = Math.sin(n * 12.9898) * 43758.5453;
        return x - Math.floor(x);
      };
      const fit = (text, maxWidth, base) => {
        let size = base;
        ctx.font = `900 ${size}px STHeiti, PingFang SC, sans-serif`;
        while (ctx.measureText(text).width > maxWidth && size > 52) {
          size -= 4;
          ctx.font = `900 ${size}px STHeiti, PingFang SC, sans-serif`;
        }
        return size;
      };
      const isAccent = (text) => /code|API|UI|deadline|1998|git|pull/i.test(text);

      function drawTreatment(treatment, time, active, logicalH) {
        const progress = clamp((time - active.start) / Math.max(0.01, active.end - active.start), 0, 1);
        const pulse = 0.5 + 0.5 * Math.sin(time * 18 + active.index);
        ctx.save();
        ctx.lineWidth = 5;
        ctx.strokeStyle = '#F23745';
        ctx.fillStyle = 'rgba(242,55,69,0.16)';
        if (treatment === 'hook-lockup') {
          const w = 1530 * clamp(progress * 2.3, 0, 1);
          ctx.strokeRect(960 - w / 2, logicalH * 0.30, w, logicalH * 0.36);
          ctx.fillStyle = `rgba(242,55,69,${0.09 + pulse * 0.08})`;
          ctx.fillRect(0, logicalH * 0.41, 1920, logicalH * 0.18);
        }
        if (treatment === 'punch-stamp') {
          for (let i = 0; i < 18; i += 1) {
            const angle = (Math.PI * 2 * i) / 18 + time * 0.2;
            const radius = 360 + (i % 4) * 42;
            ctx.fillStyle = i % 2 ? '#F23745' : '#F4EEE9';
            ctx.fillRect(960 + Math.cos(angle) * radius, logicalH * 0.50 + Math.sin(angle) * radius * 0.42, 12, 12);
          }
        }
        if (treatment === 'wide-slam') {
          ctx.fillStyle = 'rgba(242,55,69,0.18)';
          ctx.fillRect(0, logicalH * 0.39, 1920 * clamp(progress * 2, 0, 1), logicalH * 0.22);
        }
        if (treatment === 'comic-rise') {
          ctx.fillStyle = '#F23745';
          ctx.fillRect(930, logicalH * 0.72 - progress * 190, 60, 160);
          ctx.fillStyle = '#F4EEE9';
          ctx.fillText('↑', 935, logicalH * 0.66 - progress * 190);
        }
        if (treatment === 'backlog-stack' || treatment === 'requirement-redline') {
          for (let i = 0; i < 5; i += 1) {
            const x = 170 + i * 96 + Math.sin(time * 3 + i) * 8;
            const y = logicalH * 0.68 + i * 26;
            ctx.strokeStyle = i === 4 || treatment === 'requirement-redline' ? '#F23745' : 'rgba(244,238,233,0.42)';
            ctx.strokeRect(x, y, 520, 76);
          }
        }
        if (treatment === 'deadline-slip') {
          ctx.fillStyle = `rgba(242,55,69,${0.16 + pulse * 0.18})`;
          ctx.fillRect(0, logicalH * 0.45, 1920, 12);
          ctx.font = '900 160px Menlo, monospace';
          ctx.fillText('DUE', 1330 + Math.sin(time * 7) * 18, logicalH * 0.32);
        }
        if (treatment === 'calendar-shatter') {
          for (let i = 0; i < 24; i += 1) {
            const x = hash(i * 19 + active.index) * 1920;
            const y = logicalH * 0.2 + hash(i * 31 + active.index) * logicalH * 0.6;
            ctx.fillStyle = i % 3 === 0 ? '#F23745' : 'rgba(244,238,233,0.42)';
            ctx.fillRect(x + Math.sin(time * 8 + i) * 22, y, 18, 18);
          }
        }
        if (treatment === 'cupid-interrupt') {
          ctx.strokeStyle = '#F4EEE9';
          ctx.beginPath(); ctx.moveTo(1420, logicalH * 0.32); ctx.lineTo(1760, logicalH * 0.62); ctx.stroke();
          ctx.fillStyle = '#F23745';
          ctx.beginPath(); ctx.moveTo(1760, logicalH * 0.62); ctx.lineTo(1708, logicalH * 0.60); ctx.lineTo(1734, logicalH * 0.55); ctx.fill();
        }
        if (treatment === 'color-shift' || treatment === 'breath-hold') {
          const shift = ctx.createLinearGradient(0, 0, 1920, logicalH);
          shift.addColorStop(0, 'rgba(64,104,213,0.25)');
          shift.addColorStop(1, 'rgba(179,155,85,0.24)');
          ctx.fillStyle = shift;
          ctx.fillRect(0, 0, 1920, logicalH);
        }
        if (treatment === 'retro-terminal') {
          ctx.fillStyle = 'rgba(203,255,101,0.12)';
          ctx.fillRect(0, 0, 1920, logicalH);
          ctx.font = '700 42px Menlo, monospace';
          ctx.fillStyle = '#CBFF65';
          ctx.fillText('C:\\> BOOT 1998', 80, logicalH * 0.78);
        }
        ctx.restore();
      }

      function resize() {
        const scale = window.devicePixelRatio || 1;
        canvas.width = Math.round(window.innerWidth * scale);
        canvas.height = Math.round(window.innerHeight * scale);
        canvas.style.width = `${window.innerWidth}px`;
        canvas.style.height = `${window.innerHeight}px`;
      }

      function renderAt(time) {
        const W = canvas.width;
        const H = canvas.height;
        const unit = W / 1920;
        const frame = Math.floor(time * 30);
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.fillStyle = '#090B10';
        ctx.fillRect(0, 0, W, H);

        ctx.save();
        ctx.scale(unit, unit);
        const logicalH = H / unit;
        const red = '#F23745';
        const white = '#F4EEE9';

        const glow = ctx.createRadialGradient(1380, 460, 40, 1380, 460, 780);
        glow.addColorStop(0, 'rgba(242,55,69,0.22)');
        glow.addColorStop(0.58, 'rgba(120,20,31,0.08)');
        glow.addColorStop(1, 'rgba(9,11,16,0)');
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, 1920, logicalH);

        ctx.strokeStyle = 'rgba(161,24,40,0.28)';
        ctx.lineWidth = 2;
        for (let x = -96; x < 2020; x += 96) {
          const shifted = x + ((time * 36) % 96);
          ctx.beginPath(); ctx.moveTo(shifted, 0); ctx.lineTo(shifted, logicalH); ctx.stroke();
        }
        for (let y = 0; y < logicalH + 96; y += 96) {
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(1920, y); ctx.stroke();
        }

        for (let i = 0; i < 850; i += 1) {
          const x = hash(i * 31 + frame * 0.13) * 1920;
          const y = hash(i * 47 + frame * 0.19) * logicalH;
          const alpha = 0.04 + hash(i + frame) * 0.08;
          ctx.fillStyle = `rgba(244,238,233,${alpha})`;
          ctx.fillRect(x, y, 1 + hash(i * 7) * 2, 1 + hash(i * 9) * 2);
        }

        ctx.font = '900 360px Menlo, monospace';
        ctx.fillStyle = 'rgba(242,55,69,0.09)';
        ctx.fillText('0101', -60 + Math.sin(time * 0.7) * 20, 430);
        ctx.fillText('CODE', 1160 + Math.cos(time * 0.5) * 28, logicalH - 80);

        ctx.fillStyle = red;
        ctx.fillRect(((time * 210) % 2440) - 520, 150, 520, 6);
        ctx.fillStyle = 'rgba(242,55,69,0.62)';
        ctx.fillRect(1920 - ((time * 150) % 2280), logicalH - 155, 360, 4);

        ctx.font = '600 30px Menlo, monospace';
        ctx.fillStyle = white;
        ctx.fillText('SHAM.教授  //  DON’T TOUCH MY CODE', 76, 84);
        ctx.font = '400 22px Menlo, monospace';
        ctx.fillStyle = '#B5A8AA';
        ctx.fillText('BUILD 01  ·  RAP LYRIC VISUAL  ·  30 FPS', 76, 124);
        ctx.fillText('git status  /  main  /  clean', 1425, logicalH - 82);
        ctx.fillStyle = 'rgba(242,55,69,0.28)';
        ctx.fillRect(76, logicalH - 54, 1768, 7);
        ctx.fillStyle = red;
        ctx.fillRect(76, logicalH - 54, 1768 * clamp(time / window.__DURATION, 0, 1), 7);

        const active = window.__LYRICS.find((line) => time >= line.start && time < line.end);
        if (active) {
          const treatment = active.treatment || 'line-slam';
          drawTreatment(treatment, time, active, logicalH);
          const enter = clamp((time - active.start) / 0.14, 0, 1);
          const exit = clamp((active.end - time) / 0.14, 0, 1);
          const opacity = Math.min(enter, exit);
          const pop = easeOutBack(enter);
          const size = fit(active.text, 1560, active.importance >= 5 ? 132 : 116);
          const textW = ctx.measureText(active.text).width;
          const shakeX = Math.sin(time * 13 + active.index * 0.83) * 10;
          const shakeY = Math.sin(time * 7 + active.index * 0.61) * 5;
          const x = 960 - textW / 2 + shakeX;
          const y = logicalH * (treatment === 'breath-hold' ? 0.51 : active.index % 3 === 1 ? 0.55 : 0.49) + shakeY;
          const accent = treatment === 'retro-terminal' ? '#CBFF65' : isAccent(active.text) ? red : white;
          ctx.save();
          ctx.globalAlpha = opacity;
          ctx.translate(960, y);
          const scale = treatment === 'deadline-slip' ? 0.78 + pop * 0.22 : 0.84 + pop * 0.16;
          ctx.scale(scale, scale);
          if (treatment === 'deadline-slip') ctx.transform(1, 0, -0.09, 1, 0, 0);
          ctx.translate(-960, -y);
          ctx.font = `900 ${size}px STHeiti, PingFang SC, sans-serif`;
          ctx.textBaseline = 'middle';
          ctx.shadowColor = 'rgba(213,22,42,0.90)';
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#D5162A';
          ctx.fillText(active.text, x + 17, y + 15);
          ctx.shadowColor = 'rgba(9,11,16,0.90)';
          ctx.shadowBlur = 10;
          ctx.fillStyle = accent;
          ctx.fillText(active.text, x, y);
          ctx.restore();
        }

        ctx.restore();
      }

      window.renderAt = renderAt;
      window.addEventListener('resize', () => { resize(); renderAt(0); });
      resize();
      renderAt(0);
    </script>
  </body>
</html>
