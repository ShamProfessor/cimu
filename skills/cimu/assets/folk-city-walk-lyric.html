<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Lyric MV · Folk City Walk</title>
    <style>
      @font-face { font-family:'MV ZhanKu Literary'; src:url('../fonts/zhankuwenyi/站酷文艺体.ttf') format('truetype'); font-display:block; }
      html, body, canvas { width:100%; height:100%; margin:0; overflow:hidden; background:#131714; }
      canvas, img { display:block; } img { display:none; }
    </style>
  </head>
  <body>
    <img id="cover" alt="" />
    <canvas id="stage"></canvas>
    <script>
      const canvas=document.getElementById('stage'),ctx=canvas.getContext('2d',{alpha:false}),cover=document.getElementById('cover');
      window.__LYRICS=window.__LYRICS||[];window.__TIMELINE_META=window.__TIMELINE_META||{};
      const W=1920,INK='#171A16',PAPER='#F1E9DA',RUST='#B65D3C',MOSS='#78917E',DUSK='#20211A';
      const clamp=(v)=>Math.max(0,Math.min(1,v));const sinIn=(v)=>Math.sin(clamp(v)*Math.PI*.5);const hash=(v)=>{const n=Math.sin(v*19.31)*48957.73;return n-Math.floor(n);};
      function resize(){const r=devicePixelRatio||1;canvas.width=Math.round(innerWidth*r);canvas.height=Math.round(innerHeight*r);}
      function font(size,align='left'){ctx.font=`600 ${size}px "MV ZhanKu Literary",serif`;ctx.textAlign=align;ctx.textBaseline='middle';}
      function fit(text,max,base){let size=base;font(size);while(ctx.measureText(text).width>max&&size>44){size-=2;font(size);}return size;}
      function coverDraw(x,y,w,h,alpha,blur){if(!cover.complete||!cover.naturalWidth)return;const scale=Math.max(w/cover.naturalWidth,h/cover.naturalHeight),sw=w/scale,sh=h/scale;ctx.save();ctx.globalAlpha=alpha;ctx.filter=`blur(${blur}px)`;ctx.drawImage(cover,(cover.naturalWidth-sw)/2,(cover.naturalHeight-sh)/2,sw,sh,x,y,w,h);ctx.restore();}
      function audioAt(t){const a=window.__TIMELINE_META.audioData;if(!a?.frames?.length)return {rms:.3,mid:.3};return a.frames[Math.min(a.frames.length-1,Math.max(0,Math.round(t*a.fps)))];}
      function lyricColor(){return window.__TIMELINE_META.cityPalette?.lyric||PAPER;}
      function starts(line){if(line.groupStarts?.length===line.groups?.length)return line.groupStarts;const words=line.groups?.length?line.groups:[line.text];return words.map((_,i)=>line.start+.18+i*.72);}
      function sentenceLayout(groups,line,H){const base=groups.length>2?112:130;const widths=groups.map((word)=>{font(base);return ctx.measureText(word).width;});const gap=groups.length>2?28:38;const total=widths.reduce((n,v)=>n+v,0)+gap*Math.max(0,groups.length-1);const y=[H*.49,H*.46,H*.53,H*.50][line.index%4];if(total<=1510){const x=line.index%3===0?220:(W-total)/2;let cursor=x;return groups.map((_,i)=>{const p={x:cursor,y,max:widths[i],size:base};cursor+=widths[i]+gap;return p;});}return groups.map((_,i)=>({x:270,y:H*(.40+i*.18),max:1380,size:i?base*.9:base}));}
      function glow(x,y,r,color,alpha){const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,color);g.addColorStop(1,'rgba(0,0,0,0)');ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=g;ctx.fillRect(x-r,y-r,r*2,r*2);ctx.restore();}
      function route(t,H){ctx.save();ctx.strokeStyle='rgba(120,145,126,.48)';ctx.lineWidth=2;ctx.setLineDash([14,16]);ctx.beginPath();ctx.moveTo(-80,H*.79);ctx.bezierCurveTo(310,H*.70,535,H*.91,855,H*.76);ctx.bezierCurveTo(1250,H*.57,1530,H*.84,2020,H*.70);ctx.stroke();ctx.setLineDash([]);for(let i=0;i<4;i+=1){const x=230+i*470+Math.sin(t*.09+i)*14;ctx.fillStyle='rgba(241,233,218,.34)';ctx.beginPath();ctx.arc(x,H*(.75+Math.sin(i)*.045),5,0,Math.PI*2);ctx.fill();}const runner=clamp((t%12)/12);const x=-40+runner*2000;ctx.fillStyle=RUST;ctx.beginPath();ctx.arc(x,H*.76,8,0,Math.PI*2);ctx.fill();ctx.restore();}
      function world(t,H){ctx.fillStyle=DUSK;ctx.fillRect(0,0,W,H);coverDraw(-90+Math.sin(t*.055)*25,-55,W+180,H+110,.72,18);const shade=ctx.createLinearGradient(0,0,W,H);shade.addColorStop(0,'rgba(10,17,15,.76)');shade.addColorStop(.48,'rgba(31,25,18,.42)');shade.addColorStop(1,'rgba(17,15,14,.76)');ctx.fillStyle=shade;ctx.fillRect(0,0,W,H);const a=audioAt(t);glow(W*.22,H*.28,420,'rgba(191,105,66,.44)',.35+a.mid*.12);glow(W*.80,H*.36,350,'rgba(177,145,72,.32)',.30+a.rms*.1);for(let i=0;i<240;i+=1){ctx.fillStyle=i%13?'rgba(241,233,218,.035)':'rgba(182,93,60,.08)';ctx.fillRect(hash(i)*W,hash(i*9)*H,1+hash(i*3)*3,1+hash(i*7)*2);}route(t,H);ctx.fillStyle='rgba(241,233,218,.76)';font(25);ctx.fillText(window.__TIMELINE_META.title?.split('//')[0]?.trim()||'民谣',88,82);ctx.fillStyle='rgba(182,93,60,.74)';font(17);ctx.fillText('NIGHT WALK  /  LYRIC STUDY',88,122);ctx.strokeStyle='rgba(182,93,60,.72)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(88,150);ctx.lineTo(488,150);ctx.stroke();}
      function phrase(line,t,H){const words=line.groups?.length?line.groups:[line.text],points=sentenceLayout(words,line,H),at=starts(line),out=clamp((t-(line.end-.92))/.92),color=lyricColor();words.forEach((word,i)=>{const p=points[i],enter=sinIn((t-at[i])/1.15),alpha=enter*(1-sinIn(out));const size=fit(word,p.max,p.size);ctx.save();ctx.globalAlpha=alpha*.12;ctx.fillStyle='rgba(4,7,6,.85)';ctx.fillRect(p.x-28,p.y-size*.66,Math.min(1500,p.max+56),size*1.35);ctx.restore();ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=color;ctx.shadowColor='rgba(0,0,0,.70)';ctx.shadowBlur=5;ctx.shadowOffsetY=3;font(size);ctx.fillText(word,p.x+(1-enter)*10,p.y);ctx.restore();if(enter>.24){ctx.save();ctx.globalAlpha=alpha*.16;ctx.fillStyle=color;for(let k=0;k<9;k+=1){const seed=(line.index+1)*61+(i+1)*17+k;ctx.fillRect(p.x+(hash(seed)-.2)*Math.min(p.max,size*word.length*.65),p.y+(hash(seed*3)-.5)*size*.76,2+hash(seed*5)*5,1+hash(seed*7)*2);}ctx.restore();}});}
      function renderAt(t){const scale=canvas.width/W,H=canvas.height/scale;ctx.setTransform(1,0,0,1,0,0);ctx.scale(scale,scale);world(t,H);const active=window.__LYRICS.find((line)=>t>=line.start&&t<line.end);if(active)phrase(active,t,H);}
      window.loadTimelineAssets=(meta)=>{if(!meta.cover)return Promise.resolve();return new Promise((done)=>{cover.addEventListener('load',done,{once:true});cover.addEventListener('error',done,{once:true});cover.src=meta.cover;});};window.renderAt=renderAt;addEventListener('resize',()=>{resize();renderAt(0);});resize();renderAt(0);
    </script>
  </body>
</html>
