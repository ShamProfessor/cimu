<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Cimu · Soft Focus Type</title>
    <style>
      html, body, canvas { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #11070a; }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <script>
      const canvas = document.getElementById('stage');
      const ctx = canvas.getContext('2d', {alpha: false});
      window.__LYRICS = window.__LYRICS || [];
      const WHITE = '#fff8f1';
      const RED = '#e93242';
      const GREEN = '#93e4a6';
      const clamp = (n) => Math.max(0, Math.min(1, n));
      const ease = (t) => 1 - Math.pow(1 - clamp(t), 4);
      const hash = (n) => { const x = Math.sin(n * 47.13) * 10043.3; return x - Math.floor(x); };
      window.__sceneAlpha = 1;
      window.__sceneBlur = 0;

      function resize() {
        const ratio = window.devicePixelRatio || 1;
        canvas.width = Math.round(innerWidth * ratio);
        canvas.height = Math.round(innerHeight * ratio);
      }

      function setFont(size) {
        ctx.font = `900 ${size}px STKaiti, Kaiti SC, KaiTi, PingFang SC, serif`;
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'center';
      }

      function fit(text, maxWidth, base) {
        let size = base;
        setFont(size);
        while (ctx.measureText(text).width > maxWidth && size > 52) { size -= 4; setFont(size); }
        return size;
      }

      function drawWord(word, x, y, options = {}) {
        const {size = 140, alpha = 1, blur = 0, color = WHITE, scale = 1, rotation = 0, shadow = true} = options;
        ctx.save();
        ctx.globalAlpha = alpha * window.__sceneAlpha;
        ctx.translate(x, y); ctx.rotate(rotation); ctx.scale(scale, scale);
        setFont(size);
        ctx.filter = blur || window.__sceneBlur ? `blur(${blur + window.__sceneBlur}px)` : 'none';
        if (shadow && !blur) { ctx.shadowColor = 'rgba(20,0,0,.7)'; ctx.shadowBlur = 20; ctx.shadowOffsetY = 8; }
        ctx.fillStyle = color; ctx.fillText(word, 0, 0);
        ctx.restore();
      }

      function drawWorld(time, H) {
        ctx.fillStyle = '#13080c'; ctx.fillRect(0, 0, 1920, H);
        const glow = ctx.createRadialGradient(980, H * .5, 40, 980, H * .5, 950);
        glow.addColorStop(0, 'rgba(220,22,42,.66)');
        glow.addColorStop(.44, 'rgba(112,12,28,.42)');
        glow.addColorStop(1, 'rgba(13,4,7,0)');
        ctx.fillStyle = glow; ctx.fillRect(0, 0, 1920, H);
        for (let i = 0; i < 35; i += 1) {
          const x = hash(i * 7) * 1920;
          const y = hash(i * 19) * H;
          const r = 2 + hash(i * 31) * 7;
          ctx.fillStyle = i % 5 ? 'rgba(255,236,238,.16)' : 'rgba(233,50,66,.4)';
          ctx.beginPath(); ctx.arc(x + Math.sin(time + i) * 5, y, r, 0, Math.PI * 2); ctx.fill();
        }
        ctx.strokeStyle = 'rgba(255,235,235,.22)'; ctx.lineWidth = 2;
        ctx.strokeRect(38, 38, 1844, H - 76);
      }

      function focusIn(word, progress, x, y, size, options = {}) {
        const p = ease(progress);
        const direction = options.direction || 1;
        const rawX = x + direction * (1 - p) * 310;
        const rawY = y + (1 - p) * 44;
        for (let i = 8; i > 0; i -= 1) {
          const q = i / 8;
          drawWord(word, rawX - direction * q * (1 - p) * 260, rawY + q * 7, {
            size, alpha: (1 - q) * .15 * p, blur: 2 + q * 10, color: options.color || WHITE, scale: 1 + q * .02, shadow: false,
          });
        }
        drawWord(word, rawX, rawY, {size, alpha: p, color: options.color || WHITE, scale: .92 + p * .08, rotation: options.rotation || 0});
      }

      function chromatic(word, progress, x, y, size) {
        const p = ease(progress);
        const jitter = (1 - p) * 32;
        drawWord(word, x - jitter, y + 4, {size, alpha: .46 * p, color: GREEN, blur: 1.5, shadow: false});
        drawWord(word, x + jitter, y - 3, {size, alpha: .5 * p, color: RED, blur: 1.5, shadow: false});
        focusIn(word, progress, x, y, size, {direction: -1});
      }

      function breath(progress, H) {
        const p = ease(progress);
        const size = 150;
        const x = 960;
        const y = H * .5;
        const sub = clamp((progress - .06) / .25);
        focusIn('DON’T TOUCH', sub, x, y - 78, size, {direction: 1});
        chromatic('MY CODE', clamp((progress - .22) / .28), x, y + 95, size);
        const halo = .54 + Math.sin(progress * Math.PI * 3) * .08;
        ctx.save();
        ctx.globalAlpha = p * .34;
        ctx.strokeStyle = WHITE; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.ellipse(x, y + 10, 540 * halo, 214 * halo, -.09, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
      }

      function diamond(progress, H) {
        const p1 = clamp(progress / .35);
        const p2 = clamp((progress - .18) / .35);
        focusIn('我代码都', p1, 830, H * .44, 162, {direction: -1});
        chromatic('镶 钻', p2, 1050, H * .62, 224);
        for (let i = 0; i < 11; i += 1) {
          const p = ease(clamp((progress - .32 - (i % 4) * .035) / .16));
          const angle = Math.PI * 2 * i / 11;
          const x = 1070 + Math.cos(angle) * 260 * p;
          const y = H * .56 + Math.sin(angle) * 150 * p;
          ctx.fillStyle = i % 2 ? RED : WHITE; ctx.globalAlpha = .72 * p * window.__sceneAlpha;
          ctx.fillRect(x, y, 9, 9);
        }
        ctx.globalAlpha = 1;
      }

      function phrase(progress, H) {
        const groups = ['我们代表', '新一代', '那种高级商贩'];
        const coordinates = [[590, H * .3], [1040, H * .51], [980, H * .72]];
        groups.forEach((word, index) => {
          const p = clamp((progress - index * .13) / .32);
          focusIn(word, p, coordinates[index][0], coordinates[index][1], index === 2 ? 118 : 150, {direction: index % 2 ? 1 : -1, rotation: index === 1 ? -.05 : 0});
        });
      }

      function renderAt(time) {
        const W = canvas.width; const H = canvas.height; const unit = W / 1920; const logicalH = H / unit;
        ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.scale(unit, unit);
        window.__sceneAlpha = 1;
        window.__sceneBlur = 0;
        drawWorld(time, logicalH);
        const active = window.__LYRICS.find((line) => time >= line.start && time < line.end);
        if (!active) return;
        const progress = clamp((time - active.start) / Math.max(.01, active.end - active.start));
        const resolve = clamp((progress - .78) / .22);
        window.__sceneAlpha = 1 - ease(resolve);
        window.__sceneBlur = resolve * 8;
        if (active.index === 0 || active.index === 3) breath(progress, logicalH);
        if (active.index === 1) diamond(progress, logicalH);
        if (active.index === 2) phrase(progress, logicalH);
      }

      window.renderAt = renderAt;
      addEventListener('resize', () => { resize(); renderAt(0); });
      resize(); renderAt(0);
    </script>
  </body>
</html>
