<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Lyric MV · Ballad Cover Study</title>
    <style>
      @font-face {
        font-family: 'MV Ma Shan Zheng';
        src: url('../fonts/ballad-mashanzheng/MaShanZheng-Regular.ttf') format('truetype');
        font-display: block;
      }
      @font-face { font-family: 'MV ZhanKu Literary'; src: url('../fonts/zhankuwenyi/站酷文艺体.ttf') format('truetype'); font-display: block; }
      html, body, canvas { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #201914; }
      canvas { display: block; }
      #cover { display: none; }
    </style>
  </head>
  <body>
    <img id="cover" alt="" />
    <canvas id="stage"></canvas>
    <script>
      const canvas = document.getElementById('stage');
      const ctx = canvas.getContext('2d', {alpha: false});
      const cover = document.getElementById('cover');
      window.__LYRICS = window.__LYRICS || [];
      window.__TIMELINE_META = window.__TIMELINE_META || {};
      const CREAM = '#f4e6c7';
      const PAPER = '#d1ad78';
      const INK = '#201914';
      const WINE = '#6e342b';
      const clamp = (n) => Math.max(0, Math.min(1, n));
      const ease = (t) => 1 - Math.pow(1 - clamp(t), 3);
      const hash = (n) => { const x = Math.sin(n * 41.79) * 12983.32; return x - Math.floor(x); };
      window.__sceneAlpha = 1;
      window.__sceneBlur = 0;

      function resize() {
        const ratio = devicePixelRatio || 1;
        canvas.width = Math.round(innerWidth * ratio);
        canvas.height = Math.round(innerHeight * ratio);
      }

      function setLyricFont(size, weight = 600) {
        ctx.font = `${weight} ${size}px "MV ZhanKu Literary", "Hiragino Mincho ProN", "STSong", "Songti SC", serif`;
        ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
      }

      function setLabelFont(size) {
        ctx.font = `500 ${size}px "Avenir Next", "Hiragino Sans GB", sans-serif`;
        ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
      }

      function setDisplayFont(size) {
        ctx.font = `400 ${size}px "MV Ma Shan Zheng", "Hiragino Mincho ProN", serif`;
        ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
      }

      function fit(text, maxWidth, base) {
        let size = base;
        setLyricFont(size, 600);
        while (ctx.measureText(text).width > maxWidth && size > 44) { size -= 3; setLyricFont(size, 600); }
        return size;
      }

      function drawText(text, x, y, options = {}) {
        const {size = 110, alpha = 1, color = CREAM, blur = 0, scale = 1, align = 'left', label = false, display = false, rotation = 0} = options;
        ctx.save();
        ctx.globalAlpha = alpha * window.__sceneAlpha;
        ctx.translate(x, y); ctx.rotate(rotation); ctx.scale(scale, scale);
        if (label) setLabelFont(size); else if (display) setDisplayFont(size); else setLyricFont(size, 600);
        ctx.textAlign = align;
        ctx.filter = blur || window.__sceneBlur ? `blur(${blur + window.__sceneBlur}px)` : 'none';
        if (!label && !blur) { ctx.shadowColor = 'rgba(24,14,10,.62)'; ctx.shadowBlur = 14; ctx.shadowOffsetY = 5; }
        ctx.fillStyle = color; ctx.fillText(text, 0, 0);
        ctx.restore();
      }

      function drawCover(dx, dy, dw, dh, alpha = 1, blur = 0) {
        if (!cover.complete || !cover.naturalWidth) return;
        ctx.save();
        ctx.globalAlpha = alpha; ctx.filter = blur ? `blur(${blur}px)` : 'none';
        const ratio = Math.max(dw / cover.naturalWidth, dh / cover.naturalHeight);
        const sw = dw / ratio; const sh = dh / ratio;
        const sx = (cover.naturalWidth - sw) / 2; const sy = (cover.naturalHeight - sh) / 2;
        ctx.drawImage(cover, sx, sy, sw, sh, dx, dy, dw, dh);
        ctx.restore();
      }

      window.loadTimelineAssets = function(meta) {
        if (!meta.cover) return Promise.resolve();
        return new Promise((done) => { cover.addEventListener('load', done, {once:true}); cover.addEventListener('error', done, {once:true}); cover.src = meta.cover; });
      };

      function audioAt(time) {
        const audio = window.__TIMELINE_META.audioData;
        if (!audio?.frames?.length) return {rms:.3, bass:.3, mid:.3, treble:.3};
        return audio.frames[Math.min(audio.frames.length - 1, Math.max(0, Math.round(time * audio.fps)))] || {rms:.3, bass:.3, mid:.3, treble:.3};
      }

      function drawWorld(time, H) {
        ctx.fillStyle = INK; ctx.fillRect(0, 0, 1920, H);
        drawCover(-40 + Math.sin(time * .12) * 22, -65, 2010, H + 130, .37, 22);
        const veil = ctx.createLinearGradient(0, 0, 1920, 0);
        veil.addColorStop(0, 'rgba(30,20,16,.93)'); veil.addColorStop(.55, 'rgba(52,37,26,.64)'); veil.addColorStop(1, 'rgba(25,17,13,.9)');
        ctx.fillStyle = veil; ctx.fillRect(0, 0, 1920, H);
        for (let i = 0; i < 160; i += 1) {
          ctx.fillStyle = i % 7 ? 'rgba(252,236,203,.07)' : 'rgba(194,137,87,.10)';
          ctx.fillRect(hash(i) * 1920, hash(i * 7) * H, 1 + hash(i * 5) * 2, 1 + hash(i * 13) * 2);
        }
        ctx.fillStyle = 'rgba(25,16,12,.62)'; ctx.fillRect(1240, 90, 520, H - 180);
        drawCover(1270 + Math.sin(time * .15) * 14, 120, 460, H - 240, .95, 0);
        ctx.strokeStyle = 'rgba(244,230,199,.52)'; ctx.lineWidth = 2; ctx.strokeRect(1252, 102, 496, H - 204);
        drawText(window.__TIMELINE_META.title?.split('//')[0]?.trim() || '爱情转移', 118, 105, {size: 22, alpha: .72, color: PAPER, label: true});
        drawText('MEMORY TO RELEASE  /  01', 118, H - 88, {size: 18, alpha: .56, color: PAPER, label: true});
        const audio = audioAt(time); const leak = .07 + audio.treble * .10;
        const light = ctx.createRadialGradient(890, H*.24, 8, 890, H*.24, 500); light.addColorStop(0, `rgba(244,230,199,${leak})`); light.addColorStop(1, 'rgba(244,230,199,0)'); ctx.fillStyle = light; ctx.fillRect(400, 0, 1000, H);
      }

      function softBuild(text, progress, x, y, size, direction = 1, color = CREAM, display = false) {
        const p = ease(progress);
        const fromX = x + direction * (1 - p) * 96;
        for (let i = 5; i >= 1; i -= 1) {
          const q = i / 5;
          drawText(text, fromX - direction * q * 55, y + q * 5, {size, alpha: p * (1 - q) * .14, blur: 3 + q * 8, color, scale: 1 + q * .015, display});
        }
        drawText(text, fromX, y, {size, alpha: p, color, scale: .975 + p * .025, display});
      }

      function drawMoon(x, y, radius, alpha) {
        ctx.save(); ctx.globalAlpha = alpha * window.__sceneAlpha; ctx.fillStyle = PAPER;
        ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fill();
        ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(x + radius * .42, y - radius * .25, radius, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }

      function drawRail(H, progress) {
        const p = ease(progress);
        ctx.save(); ctx.globalAlpha = .56 * p * window.__sceneAlpha; ctx.strokeStyle = PAPER; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(74, H * .78); ctx.bezierCurveTo(420, H * .58, 760, H * .92, 1200, H * .66); ctx.stroke();
        ctx.strokeStyle = WINE; ctx.lineWidth = 13; ctx.beginPath(); ctx.moveTo(74, H * .78); ctx.bezierCurveTo(420, H * .58, 760, H * .92, 1200, H * .66); ctx.stroke();
        ctx.restore();
      }

      function drawScene(active, progress, H) {
        const groups = active.groups || [active.text];
        const [group0 = '', group1 = '', group2 = ''] = groups;
        if (active.index === 0) {
          drawMoon(1080, H * .28, 56, ease(progress) * .76);
          softBuild(group0, clamp(progress / .34), 126, H * .39, fit(group0, 970, 108), -1);
          softBuild(group1, clamp((progress - .18) / .34), 460, H * .58, 194, 1, PAPER, true);
          softBuild(group2, clamp((progress - .42) / .34), 148, H * .74, fit(group2, 930, 88), -1);
        } else if (active.index === 1) {
          softBuild(group0, clamp(progress / .42), 140, H * .43, fit(group0, 950, 122), -1);
          softBuild(group1, clamp((progress - .23) / .40), 388, H * .66, fit(group1, 880, 128), 1, PAPER, true);
          ctx.save(); ctx.globalAlpha = .38 * ease(progress) * window.__sceneAlpha; ctx.strokeStyle = PAPER; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(136, H * .49); ctx.lineTo(1040, H * .49); ctx.stroke(); ctx.restore();
        } else if (active.index === 2) {
          const sun = ease(progress);
          ctx.save(); ctx.globalAlpha = .22 * sun * window.__sceneAlpha; const glow = ctx.createRadialGradient(930, H * .48, 10, 930, H * .48, 460); glow.addColorStop(0, PAPER); glow.addColorStop(1, 'rgba(209,173,120,0)'); ctx.fillStyle = glow; ctx.fillRect(420, 40, 1000, H - 80); ctx.restore();
          softBuild(group0, clamp(progress / .34), 130, H * .38, fit(group0, 970, 128), -1, CREAM, true);
          softBuild(group1, clamp((progress - .26) / .38), 282, H * .66, fit(group1, 1010, 96), 1, PAPER);
        } else if (active.index === 3) {
          drawRail(H, progress);
          softBuild(group0, clamp(progress / .36), 140, H * .37, fit(group0, 930, 150), -1, CREAM);
          softBuild(group1, clamp((progress - .25) / .36), 348, H * .64, fit(group1, 900, 98), 1, PAPER);
        } else {
          softBuild(group0, clamp(progress / .42), 170, H * .52, 270, -1, CREAM, true);
          drawText('需要多勇敢', 170, H * .67, {size: 38, alpha: ease(progress) * .55, color: PAPER, label: true});
        }
      }

      function renderAt(time) {
        const W = canvas.width; const H = canvas.height; const unit = W / 1920; const logicalH = H / unit;
        ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.scale(unit, unit);
        window.__sceneAlpha = 1; window.__sceneBlur = 0; drawWorld(time, logicalH);
        const active = window.__LYRICS.find((line) => time >= line.start && time < line.end);
        if (!active) return;
        const progress = clamp((time - active.start) / Math.max(.01, active.end - active.start));
        const resolve = clamp((progress - .78) / .22);
        window.__sceneAlpha = 1 - ease(resolve); window.__sceneBlur = resolve * 9;
        drawScene(active, progress, logicalH);
      }

      window.renderAt = renderAt;
      addEventListener('resize', () => { resize(); renderAt(0); });
      resize(); renderAt(0);
    </script>
  </body>
</html>
